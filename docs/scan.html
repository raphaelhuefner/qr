    <style>
        .scan-layout {
            max-width: 44rem;
        }

        #reader {
            overflow: hidden;
            border-radius: 1.25rem;
            background: #f3f4f6;
            padding: 1rem;
        }

        #reader video {
            transform: scale(-1, 1);
        }

        #output {
            width: 100%;
            min-height: 8rem;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <main class="app-main">
            <section class="app-content">
                <div class="scan-layout">
                    <div id="reader"></div>
                    <textarea id="output" class="form-input"></textarea>
                </div>
            </section>

            <aside class="app-sidebar">
                <nav class="nav-list">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link active" href="scan.html">Scan QR Code</a>
                    <a class="nav-link" href="generate.html">Generate QR Code</a>
                </nav>
            </aside>
        </main>

        <footer class="app-footer">
            <a href="https://github.com/raphaelhuefner/qr">Readme on GitHub</a>
        </footer>
    </div>

    <script type="text/javascript">
        let lastDecodedText = '';

        const output = document.getElementById('output');

        function writeOutput(text) {
            output.innerText = text;
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (decodedText != lastDecodedText) {
                console.log(`Code matched = ${decodedText}`, decodedResult);
                writeOutput(decodedText);
            }
        }

        const ignoreErrors = [
            'No MultiFormat Readers were able to detect the code.',
            'No barcode or QR code detected.',
        ];

        function onScanFailure(error) {
            // handle scan failure.
            // usually better to ignore and keep scanning.
            const errorText = `${error}`;
            if (ignoreErrors.includes(errorText)) {
                return;
            }
            console.warn('QR Code scan error:', error);
        }

        function qrboxFunction(viewfinderWidth, viewfinderHeight) {
            const shortestEdge = Math.min(viewfinderWidth, viewfinderHeight);
            const qrboxFraction = 0.7;
            const qrboxSize = Math.floor(shortestEdge * qrboxFraction);
            return {
                width: qrboxSize,
                height: qrboxSize
            };
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 5, qrbox: qrboxFunction },
            /* verbose= */ false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
