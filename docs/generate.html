<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111827">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QR Tools">
    <title>Generate QR Code</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <script src="qrcode.min.js" type="text/javascript"></script>
    <link rel="stylesheet" href="spectre.min.css">
    <link rel="stylesheet" href="spectre-exp.min.css">
    <link rel="stylesheet" href="spectre-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .generator-card {
            max-width: 34rem;
        }

        #qrcode {
            margin-top: 1rem;
            padding: 1rem;
            display: inline-block;
            background: #fafaf7;
            border-radius: 1rem;
        }

        .app-content h2 {
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <main class="app-main">
            <section class="app-content">
                <div class="generator-card">
                    <h2>Generate QR Code</h2>
                    <div class="form-group">
                        <input class="form-input" id="text" type="text" value="hello" />
                    </div>
                    <div id="qrcode"></div>
                </div>
            </section>

            <aside class="app-sidebar">
                <nav class="nav-list">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="scan.html">Scan QR Code</a>
                    <a class="nav-link active" href="generate.html">Generate QR Code</a>
                </nav>
            </aside>
        </main>

        <footer class="app-footer">
            <a href="https://github.com/raphaelhuefner/qr">Readme on GitHub</a>
        </footer>
    </div>

    <script type="text/javascript">
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            // width: 256,
            // height: 256,
        });
        const elText = document.getElementById("text");

        function makeCode() {

            if (!elText.value) {
                alert("Input a text");
                elText.focus();
                return;
            }

            qrcode.makeCode(elText.value);
        }

        makeCode();

        elText.addEventListener("blur", () => makeCode());
        elText.addEventListener("keydown", e => e.keyCode == 13 ? makeCode() : null);
    </script>
    <script src="pwa.js"></script>
</body>

</html>
